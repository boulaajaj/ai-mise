name: Semgrep

# Open-source rules, tokenless. Advisory only (Arduino-DiggerSetup pattern):
# does not block merge. Remove continue-on-error to make strict.

on:
  pull_request:
    branches: [main]

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install semgrep
        run: pip install semgrep
      - name: Scan (OSS rules, advisory)
        run: semgrep scan --config auto --error --exclude .git || true
